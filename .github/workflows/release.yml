name: Release

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: minecraft_connector_api

jobs:
  prepare-release:
    name: Prepare release tag
    runs-on: ubuntu-latest

    outputs:
      tag_name: ${{ steps.version.outputs.tag_name }}
      release_name: ${{ steps.version.outputs.release_name }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      make_latest: ${{ steps.version.outputs.make_latest }}
      target_sha: ${{ steps.version.outputs.target_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3.2.1
        with:
          versionSpec: "6.x"

      - name: Calculate version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3.2.1
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml

      - name: Prepare release metadata
        id: version
        shell: bash
        run: |
          set -euo pipefail

          target_sha="$(git rev-parse HEAD)"
          tag_name="v${{ steps.gitversion.outputs.fullSemVer }}"
          release_name="${tag_name}"

          if [[ -n "${{ steps.gitversion.outputs.preReleaseTag }}" ]]; then
            prerelease="true"
            make_latest="false"
          else
            prerelease="false"
            make_latest="true"
          fi

          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${release_name}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"
          echo "make_latest=${make_latest}" >> "${GITHUB_OUTPUT}"
          echo "target_sha=${target_sha}" >> "${GITHUB_OUTPUT}"

      - name: Create and push git tag
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${{ steps.version.outputs.tag_name }}"
          target_sha="${{ steps.version.outputs.target_sha }}"

          if git ls-remote --exit-code --tags origin "refs/tags/${tag_name}" > /dev/null 2>&1; then
            echo "Tag ${tag_name} already exists; leaving it unchanged."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${tag_name}" "${target_sha}" -m "Release ${tag_name}"
            git push origin "refs/tags/${tag_name}"
          fi

  build-release-assets:
    name: Build ${{ matrix.asset_name }}
    needs: prepare-release
    if: needs.prepare-release.outputs.prerelease == 'false'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - asset_name: minecraft_connector_api-windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip

          - asset_name: minecraft_connector_api-windows-i686
            os: windows-latest
            target: i686-pc-windows-msvc
            archive_ext: zip

          - asset_name: minecraft_connector_api-macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz

          - asset_name: minecraft_connector_api-macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            archive_ext: tar.gz

          - asset_name: minecraft_connector_api-linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz

          - asset_name: minecraft_connector_api-linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.target_sha }}

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/${{ matrix.asset_name }}"
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" "dist/${{ matrix.asset_name }}/${{ env.BINARY_NAME }}.exe"
          Copy-Item "README.md" "dist/${{ matrix.asset_name }}/README.md"
          Compress-Archive -Path "dist/${{ matrix.asset_name }}/*" -DestinationPath "${{ matrix.asset_name }}.zip" -Force

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p "dist/${{ matrix.asset_name }}"
          cp "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}" "dist/${{ matrix.asset_name }}/${{ env.BINARY_NAME }}"
          cp "README.md" "dist/${{ matrix.asset_name }}/README.md"
          tar -czf "${{ matrix.asset_name }}.tar.gz" -C dist "${{ matrix.asset_name }}"

      - name: Upload packaged asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    needs:
      - prepare-release
      - build-release-assets
    if: needs.prepare-release.outputs.prerelease == 'false'
    runs-on: ubuntu-latest

    steps:
      - name: Download release asset artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          name: ${{ needs.prepare-release.outputs.release_name }}
          target_commitish: ${{ needs.prepare-release.outputs.target_sha }}
          prerelease: ${{ needs.prepare-release.outputs.prerelease }}
          make_latest: ${{ needs.prepare-release.outputs.make_latest }}
          generate_release_notes: true
          files: release-assets/*
