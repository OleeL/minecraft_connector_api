name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/version to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: minecraft_connector_api

jobs:
  build-release-assets:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - asset_name: minecraft_connector_api-windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip

          - asset_name: minecraft_connector_api-windows-i686
            os: windows-latest
            target: i686-pc-windows-msvc
            archive_ext: zip

          - asset_name: minecraft_connector_api-macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz

          - asset_name: minecraft_connector_api-macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            archive_ext: tar.gz

          - asset_name: minecraft_connector_api-linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz

          - asset_name: minecraft_connector_api-linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/${{ matrix.asset_name }}"
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" "dist/${{ matrix.asset_name }}/${{ env.BINARY_NAME }}.exe"
          Copy-Item "README.md" "dist/${{ matrix.asset_name }}/README.md"
          Compress-Archive -Path "dist/${{ matrix.asset_name }}/*" -DestinationPath "${{ matrix.asset_name }}.zip" -Force

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p "dist/${{ matrix.asset_name }}"
          cp "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}" "dist/${{ matrix.asset_name }}/${{ env.BINARY_NAME }}"
          cp "README.md" "dist/${{ matrix.asset_name }}/README.md"
          tar -czf "${{ matrix.asset_name }}.tar.gz" -C dist "${{ matrix.asset_name }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: ${{ matrix.asset_name }}.${{ matrix.archive_ext }}
